<section class="auth-page fade-in-up">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-6">
      <div class="surface-panel p-4 p-lg-5 auth-card mx-auto">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
          <span class="pill-tag">Join / Sign in</span>
          <div class="btn-group btn-group-sm" role="tablist" aria-label="Authentication mode">
            <button class="btn btn-outline-light active" type="button" data-auth-mode="login">Login</button>
            <button class="btn btn-outline-light" type="button" data-auth-mode="register">Register</button>
          </div>
        </div>
        <h1 class="page-title display-6 mb-2" data-auth-title>Enter your reading room</h1>
        <p class="muted-copy mb-4" data-auth-copy>Use one of the seeded demo accounts, or create a new reading profile with Supabase Auth.</p>

        <form id="login-form" class="d-grid gap-3">
          <div data-auth-name-group hidden>
            <label class="form-label" for="login-name">Display name</label>
            <input id="login-name" name="name" class="form-control form-control-lg" type="text" placeholder="Your name" autocomplete="name" />
          </div>
          <div>
            <label class="form-label" for="login-email">Email</label>
            <input id="login-email" name="email" class="form-control form-control-lg" type="email" placeholder="reader1@example.com" autocomplete="email" required />
          </div>
          <div>
            <label class="form-label" for="login-password">Password</label>
            <input id="login-password" name="password" class="form-control form-control-lg" type="password" placeholder="pass123" autocomplete="current-password" required />
          </div>
          <button class="btn btn-primary btn-lg" type="submit" data-auth-submit>Continue</button>
        </form>
      </div>
    </div>
  </div>
</section>
