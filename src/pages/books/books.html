<section class="books-page fade-in-up">
  <div class="surface-panel surface-panel--strong p-4 p-lg-5 mb-4">
    <div class="d-flex flex-wrap justify-content-between gap-3 align-items-end">
      <div>
        <span class="pill-tag pill-tag--accent mb-3">Catalog</span>
        <h1 class="page-title h2 mb-2">Browse the shelf</h1>
        <p class="muted-copy mb-0">Explore the full catalog from the database, then open a title to add it to your personal library.</p>
      </div>
    </div>
  </div>

  <div class="row g-3" data-books-grid>
    {{cards}}
  </div>
</section>
