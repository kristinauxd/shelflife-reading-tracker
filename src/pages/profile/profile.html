<section class="profile-page fade-in-up">
  <div class="row g-3">
    <div class="col-lg-4">
      <div class="surface-panel p-4 h-100 text-center">
        <div class="avatar-circle mx-auto mb-3">{{initials}}</div>
        <h1 class="page-title h3 mb-1">{{name}}</h1>
        <div class="muted-copy text-uppercase small">{{role}}</div>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="surface-panel p-4 p-lg-5 h-100">
        <span class="badge text-bg-warning status-chip mb-3">Profile</span>
        <h2 class="h4 mb-3">Preferences</h2>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Email notifications</label>
            <div class="form-control form-control-lg bg-transparent text-light">Enabled</div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Weekly digest</label>
            <div class="form-control form-control-lg bg-transparent text-light">Sunday</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
