<section class="protected-shell fade-in-up">
  <div class="surface-panel p-4 p-lg-5">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
      <div>
        <span class="badge text-bg-warning status-chip mb-3">Protected area</span>
        <h1 class="page-title h2 mb-2">{{title}}</h1>
        <p class="muted-copy mb-0">{{description}}</p>
      </div>
      <a class="btn btn-outline-light btn-sm" data-link href="/dashboard">Dashboard</a>
    </div>
    <div class="protected-content">{{content}}</div>
  </div>
</section>
